<style>
  :root{
    --bg: #0a0d12;
    --panel: #10141c;
    --panel-border: #1f2733;
    --accent: #5eead4;
    --accent-dim: rgba(94,234,212,0.12);
    --warm: #ffb86b;
    --text: #edeff4;
    --muted: #7c8798;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Sora', sans-serif;
    --body: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    min-height:100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
    position: relative;
    overflow-x:hidden;
  }

  /* ambient grid + glow */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(94,234,212,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,234,212,0.045) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 20%, black 10%, transparent 75%);
    pointer-events:none;
  }
  body::after{
    content:"";
    position:fixed;
    top:-20%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    height:500px;
    background: radial-gradient(circle, rgba(94,234,212,0.16), transparent 65%);
    pointer-events:none;
    filter: blur(10px);
  }

  .window{
    position:relative;
    width:100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    overflow:hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    animation: rise .7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(18px) scale(.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .titlebar{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 13px 16px;
    background: #0c1017;
    border-bottom: 1px solid var(--panel-border);
  }
  .dot{ width:10px; height:10px; border-radius:50%; opacity:.85; }
  .dot.red{ background:#ff5f56; }
  .dot.yellow{ background:#ffbd2e; }
  .dot.green{ background:#27c93f; }
  .titlebar span{
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .2px;
  }

  .content{
    padding: 40px 30px 34px;
    text-align:center;
  }

  .avatar{
    width: 88px;
    height: 88px;
    margin: 0 auto 22px;
    border-radius: 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 28px;
    color: #0a0d12;
    background: linear-gradient(135deg, var(--accent), #38bdf8);
    box-shadow: 0 0 0 1px rgba(94,234,212,0.25), 0 18px 40px -12px rgba(94,234,212,0.45);
    position: relative;
    overflow: hidden;
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }
  .avatar .fallback{
    display:none;
    width:100%;
    height:100%;
    align-items:center;
    justify-content:center;
  }

  .prompt{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--accent);
    letter-spacing: .3px;
    margin-bottom: 10px;
  }
  .prompt::after{
    content:"";
    display:inline-block;
    width: 7px;
    height: 13px;
    background: var(--accent);
    margin-left: 4px;
    transform: translateY(2px);
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  h1{
    font-family: var(--display);
    font-weight: 800;
    font-size: 27px;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .role{
    display:inline-flex;
    align-items:center;
    gap:7px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--panel-border);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 30px;
  }
  .role .pulse{
    width:7px; height:7px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(94,234,212,.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(94,234,212,.5); }
    70%{ box-shadow: 0 0 0 7px rgba(94,234,212,0); }
    100%{ box-shadow: 0 0 0 0 rgba(94,234,212,0); }
  }

  .links{
    display:flex;
    flex-direction:column;
    gap: 13px;
  }

  .link-card{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 15px 18px;
    background: #0d1119;
    border: 1px solid var(--panel-border);
    border-radius: 13px;
    text-decoration:none;
    color: var(--text);
    text-align:left;
    transition: transform .22s cubic-bezier(.16,1,.3,1), border-color .22s ease, background .22s ease;
    opacity:0;
    animation: fadeUp .55s cubic-bezier(.16,1,.3,1) forwards;
  }
  .link-card:nth-of-type(1){ animation-delay: .15s; }
  .link-card:nth-of-type(2){ animation-delay: .25s; }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .link-card:hover{
    transform: translateY(-3px);
    border-color: var(--accent);
    background: #0e1420;
  }
  .link-card:active{ transform: translateY(-1px); }

  .icon{
    flex-shrink:0;
    width: 50px;
    height: 50px;
    border-radius: 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .22s cubic-bezier(.16,1,.3,1);
  }
  .icon.portfolio{
    background: linear-gradient(150deg, var(--accent), #38bdf8);
    box-shadow: 0 0 0 1px rgba(94,234,212,0.2), 0 10px 24px -8px rgba(94,234,212,0.55);
    color: #071019;
  }
  .icon.whatsapp{
    background: linear-gradient(150deg, #34e072, #1fae55);
    box-shadow: 0 0 0 1px rgba(37,211,102,0.2), 0 10px 24px -8px rgba(37,211,102,0.55);
    color: #06210f;
  }
  .icon svg{ width: 24px; height: 24px; }
  .link-card:hover .icon{ transform: scale(1.07) rotate(-3deg); }

  .label{ flex:1; min-width:0; }
  .label .t{
    font-family: var(--display);
    font-weight: 600;
    font-size: 14.5px;
  }
  .label .s{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .arrow{
    color: var(--muted);
    transition: transform .22s ease, color .22s ease;
  }
  .link-card:hover .arrow{ transform: translateX(3px); color: var(--accent); }

  footer{
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 11px;
    color: #4b5568;
    letter-spacing: .3px;
  }
  footer .warm{ color: var(--warm); }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
